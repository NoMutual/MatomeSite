name: Update work-tags

on:
  schedule:
    # 3時間ごと (JST だと 00:00, 03:00, 06:00, ...)
    - cron: "0 */3 * * *"
  workflow_dispatch: # 手動トリガーも可能

permissions:
  contents: write

concurrency:
  group: update-tags
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest works + tag
        run: node --experimental-strip-types scripts/tag-works.ts
        env:
          DUGA_APPID: ${{ secrets.DUGA_APPID }}
          DUGA_AGENTID: ${{ secrets.DUGA_AGENTID }}
          DUGA_BANNERID: ${{ secrets.DUGA_BANNERID }}
          TAG_TARGET_COUNT: "200"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/work-tags.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat data/work-tags.json
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/work-tags.json
          git commit -m "chore: auto-update work-tags ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
