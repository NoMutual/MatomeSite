name: Post to X

on:
  schedule:
    # 3時間ごと (tag update とズラすため :30)
    - cron: "30 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: post-x
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Post to X
        run: node --experimental-strip-types scripts/post-to-x.ts
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}

      - name: Commit posted log
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet data/x-posted.json; then
            echo "No changes"
          else
            git pull --rebase
            git add data/x-posted.json
            git commit -m "chore: log X post ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
